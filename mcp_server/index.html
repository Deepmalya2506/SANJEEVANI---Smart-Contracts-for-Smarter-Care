<!DOCTYPE html>
<html>
<head>
    <title>Sanjeevani MCP Chat</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 20px;
        }

        #chatbox {
            width: 600px;
            height: 400px;
            overflow-y: auto;
            border: 1px solid #334155;
            padding: 10px;
            background: #020617;
            margin-bottom: 10px;
        }

        .msg {
            margin: 10px 0;
        }

        .user {
            color: #38bdf8;
        }

        .bot {
            color: #22c55e;
        }

        input {
            width: 500px;
            padding: 10px;
            border: none;
        }

        button {
            padding: 10px;
            background: #22c55e;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🚑 Sanjeevani MCP</h1>

<div id="chatbox"></div>

<input id="input" placeholder="Ask something..." />
<button onclick="send()">Send</button>

<script>
async function send() {
    const input = document.getElementById("input");
    const chatbox = document.getElementById("chatbox");

    const message = input.value;
    if (!message) return;

    chatbox.innerHTML += `<div class="msg user">You: ${message}</div>`;

    input.value = "";

    try {
        const res = await fetch("http://127.0.0.1:9001/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ 
            message,
            hospital_id: "h1"   // 🔥 simulate logged-in hospital
        })
        });

        const data = await res.json();

        chatbox.innerHTML += `<div class="msg bot">AI: ${data.response}</div>`;
        chatbox.scrollTop = chatbox.scrollHeight;

    } catch (err) {
        chatbox.innerHTML += `<div class="msg bot">⚠️ Error connecting to MCP</div>`;
    }
}
</script>

</body>
</html>
